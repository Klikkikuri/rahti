# The default Klikkikuri configuration file

sources:
  - name: Yle Uutiset
    type: rss
    url:
      - https://yle.fi/uutiset/rss/uutiset.rss
      - https://yle.fi/rss/uutiset/paauutiset
      - https://yle.fi/rss/uutiset/tuoreimmat
      - https://yle.fi/rss/uutiset/luetuimmat

  - name: MTV Uutiset – RSS
    type: rss
    url: https://www.mtvuutiset.fi/api/feed/rss/uutiset

  - name: MTV Uutiset – Sitemap
    type: sitemap
    url: https://www.mtvuutiset.fi/newssitemap

  - name: Äks
    type: rss
    url: https://aksa.fi/feed/

  - name: Iltalehti
    type: iltalehti  # Custom iltalehti source type, uses json API instead of RSS
    url: https://api.il.fi/v1/articles/iltalehti/lists/latest?limit=90&image_sizes[]=size138

rahti:
  # Rahti file to push / pull
  url: "https://api.github.com/repos/Klikkikuri/rahti/contents/data.json"

  # See: https://docs.github.com/en/rest/repos/contents?apiVersion=2022-11-28#get-repository-content--fine-grained-access-tokens
  # Use `GITHUB_TOKEN` secret environment variable
  #auth_token: ""

  committer:
    name: "[🤖 bot] Klikkikuri harbormaster"
    email: "klikkikuri+satamamestari@protonmail.com"


llm:
  - name: gemini/gemini-3.1-flash-lite
    provider: gemini
    model: gemini-3.1-flash-lite

# Url patterns to filter out early. These can be either simple substrings or regexes (if the pattern starts and ends with "/").
url_blacklist:
  - "://www.iltalehti.fi/palat/"  # Lyhyet

  # Alma syndicated sisältö
  - "://www.tekniikkatalous.fi/"
  - "://www.uusisuomi.fi/"
  - "://www.kauppalehti.fi/"
